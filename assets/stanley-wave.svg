<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 252" width="240" height="252" role="img" aria-label="Stanley, the MotionCue figure, seated cross-legged and waving hello">
  <defs>
    <style>
      .sage{fill:#788870}
      .sageDark{fill:#6E7D65}
      .limb{fill:none;stroke:#788870;stroke-linecap:round;stroke-linejoin:round}
      .face{fill:none;stroke:#33402D;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="120" cy="238" rx="96" ry="12" fill="#000000" opacity="0.06"/>

  <!-- cushion (his little pouf) -->
  <ellipse cx="120" cy="230" rx="90" ry="17" fill="#A9713E"/>
  <ellipse cx="120" cy="222" rx="80" ry="13" fill="#CE9A64"/>

  <!-- crossed legs (slightly deeper sage, read behind the torso) -->
  <path class="limb" stroke="#6E7D65" stroke-width="34" d="M118 170 Q86 190 60 208"/>
  <path class="limb" stroke="#6E7D65" stroke-width="34" d="M122 170 Q154 190 180 208"/>
  <path class="limb" stroke="#6E7D65" stroke-width="27" d="M80 214 L160 214"/>

  <!-- torso -->
  <path class="sage" d="M94 124 C94 112 146 112 146 124 L140 168 C140 182 100 182 100 168 Z"/>

  <!-- resting arm (his left) down to the knee -->
  <path class="limb" stroke-width="22" d="M140 128 Q159 150 165 188"/>

  <!-- waving arm (his right), raised with an open hand -->
  <path class="limb" stroke-width="22" d="M100 128 Q76 108 68 72"/>
  <circle class="sage" cx="67" cy="64" r="13"/>
  <!-- little motion hint by the waving hand -->
  <path d="M46 52 Q40 58 42 66" fill="none" stroke="#788870" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <path d="M52 44 Q45 50 47 60" fill="none" stroke="#788870" stroke-width="3" stroke-linecap="round" opacity="0.30"/>

  <!-- neck -->
  <path class="limb" stroke-width="22" d="M120 122 L120 110"/>

  <!-- head -->
  <circle class="sage" cx="120" cy="86" r="30"/>
  <!-- small hair tuft, keeps his silhouette character -->
  <circle class="sage" cx="137" cy="63" r="8"/>

  <!-- friendly face -->
  <circle cx="109" cy="85" r="3.7" fill="#33402D"/>
  <circle cx="131" cy="85" r="3.7" fill="#33402D"/>
  <circle cx="107.7" cy="83.6" r="1.2" fill="#ffffff" opacity="0.9"/>
  <circle cx="129.7" cy="83.6" r="1.2" fill="#ffffff" opacity="0.9"/>
  <path class="face" stroke-width="3" d="M109 97 Q120 106 131 97"/>
</svg>
